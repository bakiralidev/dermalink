services:
  - type: web
    name: dermalink-api
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements.server.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TELEGRAM_ENABLED
        value: "false"
